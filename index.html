<html lang="uz">
<head>

<title>ПК-394 — Мониторинг паспортлари</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2e3345;
  --text: #e4e6ef;
  --text2: #8b90a5;
  --accent: #4f8cff;
  --accent-dim: rgba(79,140,255,0.12);
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.12);
  --yellow: #fbbf24;
  --yellow-dim: rgba(251,191,36,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.10);
  --orange: #fb923c;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
}

.header h1 span {
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  margin-left: 8px;
  opacity: 0.8;
}

.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 500;
}
.btn:hover { background: var(--border); color: var(--text); }
.btn-accent {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-accent:hover { opacity: 0.85; }

.sync-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid var(--border);
}
.sync-badge.online {
  background: var(--green-dim);
  color: var(--green);
  border-color: rgba(52,211,153,0.3);
}
.sync-badge.offline {
  background: var(--red-dim);
  color: var(--red);
  border-color: rgba(248,113,113,0.3);
}
.sync-badge.syncing {
  background: var(--yellow-dim);
  color: var(--yellow);
  border-color: rgba(251,191,36,0.3);
}
.sync-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: currentColor;
}
.sync-badge.online .sync-dot { animation: pulse 2s infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.stats-bar {
  display: flex;
  gap: 24px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.stat-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--surface2);
  border-radius: 10px;
  border: 1px solid var(--border);
  min-width: 140px;
}

.stat-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.stat-card .stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  line-height: 1;
}

.stat-card .stat-label {
  font-size: 11px;
  color: var(--text2);
  line-height: 1.2;
}

.progress-bar-wrap {
  flex: 1;
  min-width: 200px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  justify-content: center;
}

.progress-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text2);
}

.progress-bar-bg {
  height: 8px;
  background: var(--surface2);
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 8px;
  transition: width 0.4s ease;
}

.filters {
  display: flex;
  gap: 8px;
  padding: 12px 32px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  align-items: center;
  position: sticky;
  top: 106px;
  z-index: 99;
}

.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 500;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

.search-box {
  margin-left: auto;
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  width: 240px;
  outline: none;
  transition: border-color 0.15s;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text2); }

.table-wrap {
  padding: 16px 32px 60px;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
}

thead tr:first-child th {
  background: var(--surface);
  padding: 12px 14px;
  text-align: left;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

thead tr:first-child th.check-col {
  text-align: center;
  min-width: 110px;
}

.col-stats-row th {
  background: var(--surface);
  padding: 8px 14px 10px;
  border-bottom: 2px solid var(--border);
  text-align: center;
  vertical-align: middle;
}

.col-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.col-stat-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  line-height: 1;
}

.col-stat-count {
  font-size: 10px;
  color: var(--text2);
  font-weight: 500;
}

.col-mini-bar {
  width: 80px;
  height: 5px;
  background: var(--surface2);
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.col-mini-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.4s ease;
}

tbody tr {
  transition: background 0.1s;
}
tbody tr:hover { background: var(--surface); }
tbody tr.completed { background: var(--green-dim); }

tbody td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

td.num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text2);
  width: 44px;
  text-align: center;
}

td.org-name {
  max-width: 420px;
  font-weight: 500;
  line-height: 1.35;
}

td.check-cell {
  text-align: center;
}

.category-row td {
  background: var(--surface2);
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--accent);
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
}

.cb-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.cb-wrap input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 22px;
  height: 22px;
  border: 2px solid var(--border);
  border-radius: 6px;
  background: var(--surface2);
  cursor: pointer;
  position: relative;
  transition: all 0.15s;
}

.cb-wrap input[type="checkbox"]:hover {
  border-color: var(--accent);
  background: var(--accent-dim);
}

.cb-wrap input[type="checkbox"]:checked {
  background: var(--green);
  border-color: var(--green);
}

.cb-wrap input[type="checkbox"]:checked::after {
  content: '\2713';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
}

.row-status {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}

.status-0 { background: var(--red-dim); color: var(--red); }
.status-1 { background: var(--yellow-dim); color: var(--orange); }
.status-2 { background: var(--yellow-dim); color: var(--yellow); }
.status-3 { background: var(--accent-dim); color: var(--accent); }
.status-4 { background: var(--green-dim); color: var(--green); }

.export-toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--green);
  color: #000;
  padding: 12px 20px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 13px;
  opacity: 0;
  transform: translateY(12px);
  transition: all 0.3s;
  pointer-events: none;
  z-index: 200;
}
.export-toast.show {
  opacity: 1;
  transform: translateY(0);
}

.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  gap: 16px;
  transition: opacity 0.4s;
}
.loading-overlay.hide {
  opacity: 0;
  pointer-events: none;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  color: var(--text2);
  font-size: 14px;
}

@media (max-width: 900px) {
  .header { padding: 16px; }
  .filters { padding: 10px 16px; }
  .table-wrap { padding: 12px 8px 60px; }
  .search-box { width: 160px; }
  td.org-name { max-width: 220px; }
}
</style>
</head>

  {id:80, name:"Савдо-саноат палатаси"},
  {id:81, name:"\"Ўзмиллийбанк\" АЖ"},
  {id:82, name:"\"Ўзсувтаъминот\" АЖ"},
  {id:83, name:"\"Ўзавтосаноат\" АЖ"},
  {id:84, name:"\"Иссиқлик таъминоти\" АЖ"},
  {id:85, name:"\"Ўзсаноатқурилишматериаллари\" уюшмаси"},
];

// ── State ──
let state = {};
let currentFilter = 'all';
let isConnected = false;

function getOrgState(id) {
  if (!state[id]) state[id] = [false, false, false, false];
  return state[id];
}

function getCheckedCount(id) {
  return getOrgState(id).filter(Boolean).length;
}

function statusLabel(count) {
  const labels = ['Бошланмаган','1/4','2/4','3/4','Тугалланган \u2713'];
  return '<span class="row-status status-' + count + '">' + labels[count] + '</span>';
}

// ── Firebase: realtime listener ──
checklistRef.on('value', function(snapshot) {
  var data = snapshot.val();
  if (data) {
    state = {};
    for (var key in data) {
      if (data.hasOwnProperty(key)) {
        state[key] = Array.isArray(data[key]) ? data[key] : [false, false, false, false];
      }
    }
  } else {
    state = {};
  }
  render();

  var overlay = document.getElementById('loadingOverlay');
  if (overlay) overlay.classList.add('hide');
  setTimeout(function() { if (overlay) overlay.style.display = 'none'; }, 500);
});

// ── Connection status ──
db.ref('.info/connected').on('value', function(snap) {
  isConnected = snap.val() === true;
  updateSyncBadge();
});

function updateSyncBadge() {
  var badge = document.getElementById('syncBadge');
  var text = document.getElementById('syncText');
  if (isConnected) {
    badge.className = 'sync-badge online';
    text.textContent = 'Онлайн \u00b7 Realtime';
  } else {
    badge.className = 'sync-badge offline';
    text.textContent = 'Офлайн';
  }
}

// ── Toggle → Firebase ──
function toggle(id, idx, val) {
  var s = getOrgState(id);
  s[idx] = val;
  checklistRef.child(String(id)).set(s);
}

// ── Render ──
function render() {
  var tbody = document.getElementById('tableBody');
  var searchEl = document.querySelector('.search-box');
  var search = searchEl ? searchEl.value.toLowerCase() : '';
  var html = '';

  for (var i = 0; i < orgs.length; i++) {
    var item = orgs[i];
    if (item.cat) {
      html += '<tr class="category-row"><td colspan="7">' + item.cat + '</td></tr>';
      continue;
    }
    var s = getOrgState(item.id);
    var cnt = getCheckedCount(item.id);
    var matchSearch = !search || item.name.toLowerCase().indexOf(search) !== -1;
    var matchFilter = currentFilter === 'all'
      || (currentFilter === 'none' && cnt === 0)
      || (currentFilter === 'partial' && cnt > 0 && cnt < 4)
      || (currentFilter === 'done' && cnt === 4);

    if (!matchSearch || !matchFilter) continue;

    html += '<tr class="' + (cnt===4?'completed':'') + '">'
      + '<td class="num">' + item.id + '</td>'
      + '<td class="org-name">' + item.name + '</td>';
    for (var j = 0; j < 4; j++) {
      html += '<td class="check-cell"><label class="cb-wrap"><input type="checkbox" '
        + (s[j]?'checked ':'')
        + 'onchange="toggle(' + item.id + ',' + j + ',this.checked)"></label></td>';
    }
    html += '<td>' + statusLabel(cnt) + '</td></tr>';
  }
  tbody.innerHTML = html;
  updateStats();
}

function setFilter(f, btn) {
  currentFilter = f;
  var btns = document.querySelectorAll('.filter-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  render();
}

function applyFilters() { render(); }

function updateStats() {
  var total = 0;
  for (var i = 0; i < orgs.length; i++) { if (orgs[i].id) total++; }
  var done = 0, partial = 0, none = 0, totalChecks = 0;
  var colCounts = [0, 0, 0, 0];

  for (var i = 0; i < orgs.length; i++) {
    var o = orgs[i];
    if (!o.id) continue;
    var s = getOrgState(o.id);
    var c = getCheckedCount(o.id);
    totalChecks += c;
    for (var j = 0; j < 4; j++) { if (s[j]) colCounts[j]++; }
    if (c === 4) done++;
    else if (c > 0) partial++;
    else none++;
  }
  var pct = Math.round(totalChecks / (total * 4) * 100);

  document.getElementById('statsBar').innerHTML =
    '<div class="stat-card">'
    + '<div class="stat-dot" style="background:var(--green)"></div>'
    + '<div><div class="stat-value">' + done + '</div><div class="stat-label">Тугалланган</div></div>'
    + '</div>'
    + '<div class="stat-card">'
    + '<div class="stat-dot" style="background:var(--yellow)"></div>'
    + '<div><div class="stat-value">' + partial + '</div><div class="stat-label">Жараёнда</div></div>'
    + '</div>'
    + '<div class="stat-card">'
    + '<div class="stat-dot" style="background:var(--red)"></div>'
    + '<div><div class="stat-value">' + none + '</div><div class="stat-label">Бошланмаган</div></div>'
    + '</div>'
    + '<div class="progress-bar-wrap">'
    + '<div class="progress-bar-label"><span>Умумий прогресс</span><span>' + pct + '% (' + totalChecks + '/' + (total*4) + ')</span></div>'
    + '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>'
    + '</div>';

  var colColors = ['var(--accent)','var(--orange)','var(--yellow)','var(--green)'];
  for (var i = 0; i < 4; i++) {
    var cp = Math.round(colCounts[i] / total * 100);
    document.getElementById('colStat'+i).innerHTML =
      '<div class="col-stat">'
      + '<div class="col-stat-pct" style="color:' + colColors[i] + '">' + cp + '%</div>'
      + '<div class="col-stat-count">' + colCounts[i] + ' / ' + total + '</div>'
      + '<div class="col-mini-bar"><div class="col-mini-fill" style="width:' + cp + '%;background:' + colColors[i] + '"></div></div>'
      + '</div>';
  }
}

function resetAll() {
  if (!confirm('Барча маълумотлар ўчирилсинми? Бу барча фойдаланувчилар учун ўчирилади!')) return;
  checklistRef.remove();
}

function exportCSV() {
  var csv = '\uFEFF\u2116,Ташкилот номи,Паспорт мавжуд,Масъул аниқланган,Порталга киритилган,АСРР текширган,Ҳолати\n';
  for (var i = 0; i < orgs.length; i++) {
    var o = orgs[i];
    if (!o.id) continue;
    var s = getOrgState(o.id);
    var cnt = getCheckedCount(o.id);
    var labels = ['Бошланмаган','1/4','2/4','3/4','Тугалланган'];
    var name = o.name.replace(/"/g, '""');
    csv += o.id + ',"' + name + '",' + (s[0]?'Ха':'Йўқ') + ',' + (s[1]?'Ха':'Йўқ') + ',' + (s[2]?'Ха':'Йўқ') + ',' + (s[3]?'Ха':'Йўқ') + ',' + labels[cnt] + '\n';
  }
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pk394_monitoring_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  showToast('\u2193 CSV файл юклаб олинди');
}

function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 2500);
}
</script>
