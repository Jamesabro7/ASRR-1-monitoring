<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПК-394 — Мониторинг паспортлари</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2e3345;
  --text: #e4e6ef;
  --text2: #8b90a5;
  --accent: #4f8cff;
  --accent-dim: rgba(79, 140, 255, 0.12);
  --green: #34d399;
  --green-dim: rgba(52, 211, 153, 0.12);
  --yellow: #fbbf24;
  --yellow-dim: rgba(251, 191, 36, 0.12);
  --red: #f87171;
  --red-dim: rgba(248, 113, 113, 0.10);
  --orange: #fb923c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background:
    radial-gradient(circle at top right, rgba(79, 140, 255, 0.08), transparent 24%),
    radial-gradient(circle at bottom left, rgba(52, 211, 153, 0.07), transparent 20%),
    var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  background: rgba(26, 29, 39, 0.92);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.header h1 span {
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  margin-left: 8px;
  opacity: 0.85;
}

.header-subtitle {
  margin-top: 6px;
  color: var(--text2);
  font-size: 13px;
}

.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 500;
}

.btn:hover { background: var(--border); color: var(--text); }

.btn-accent {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.btn-accent:hover { opacity: 0.88; }

.sync-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(52, 211, 153, 0.3);
}

.sync-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: currentColor;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}

.stats-bar {
  display: flex;
  gap: 24px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.stat-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: rgba(35, 39, 51, 0.9);
  border-radius: 10px;
  border: 1px solid var(--border);
  min-width: 140px;
}

.stat-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.stat-card .stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  line-height: 1;
}

.stat-card .stat-label {
  font-size: 11px;
  color: var(--text2);
  line-height: 1.2;
}

.progress-bar-wrap {
  flex: 1;
  min-width: 220px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  justify-content: center;
}

.progress-bar-label {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  font-size: 11px;
  color: var(--text2);
}

.progress-bar-bg {
  height: 8px;
  background: var(--surface2);
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  border-radius: 8px;
  transition: width 0.35s ease;
}

.filters {
  display: flex;
  gap: 8px;
  padding: 12px 32px;
  background: rgba(15, 17, 23, 0.94);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  align-items: center;
  position: sticky;
  top: 110px;
  z-index: 99;
  backdrop-filter: blur(12px);
}

.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 500;
  white-space: nowrap;
}

.filter-btn:hover { border-color: var(--accent); color: var(--text); }

.filter-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

.search-box {
  margin-left: auto;
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  width: 260px;
  outline: none;
  transition: border-color 0.15s;
}

.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text2); }

.table-wrap {
  padding: 16px 32px 60px;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
}

thead tr:first-child th {
  background: var(--surface);
  padding: 12px 14px;
  text-align: left;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

thead tr:first-child th.check-col {
  text-align: center;
  min-width: 110px;
}

.col-stats-row th {
  background: var(--surface);
  padding: 8px 14px 10px;
  border-bottom: 2px solid var(--border);
  text-align: center;
  vertical-align: middle;
}

.col-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.col-stat-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  line-height: 1;
}

.col-stat-count {
  font-size: 10px;
  color: var(--text2);
  font-weight: 500;
}

.col-mini-bar {
  width: 80px;
  height: 5px;
  background: var(--surface2);
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.col-mini-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.35s ease;
}

tbody tr {
  transition: background 0.1s;
}

tbody tr:hover { background: rgba(26, 29, 39, 0.8); }
tbody tr.completed { background: var(--green-dim); }

tbody td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

td.num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text2);
  width: 44px;
  text-align: center;
}

td.org-name {
  min-width: 360px;
  max-width: 560px;
  font-weight: 500;
  line-height: 1.4;
}

.org-line {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.passport-count {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(79, 140, 255, 0.14);
  color: #9ec0ff;
  border: 1px solid rgba(79, 140, 255, 0.24);
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
}

td.check-cell {
  text-align: center;
}

.cb-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.cb-wrap input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 22px;
  height: 22px;
  border: 2px solid var(--border);
  border-radius: 6px;
  background: var(--surface2);
  cursor: pointer;
  position: relative;
  transition: all 0.15s;
}

.cb-wrap input[type="checkbox"]:hover {
  border-color: var(--accent);
  background: var(--accent-dim);
}

.cb-wrap input[type="checkbox"]:checked {
  background: var(--green);
  border-color: var(--green);
}

.cb-wrap input[type="checkbox"]:checked::after {
  content: '\2713';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
}

.row-status {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}

.status-0 { background: var(--red-dim); color: var(--red); }
.status-1 { background: var(--yellow-dim); color: var(--orange); }
.status-2 { background: var(--yellow-dim); color: var(--yellow); }
.status-3 { background: var(--accent-dim); color: var(--accent); }
.status-4 { background: var(--green-dim); color: var(--green); }

.export-toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--green);
  color: #09110d;
  padding: 12px 20px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 13px;
  opacity: 0;
  transform: translateY(12px);
  transition: all 0.3s;
  pointer-events: none;
  z-index: 200;
}

.export-toast.show {
  opacity: 1;
  transform: translateY(0);
}

@media (max-width: 900px) {
  .header { padding: 16px; }
  .filters { padding: 10px 16px; top: 148px; }
  .table-wrap { padding: 12px 8px 60px; }
  .search-box { width: 100%; margin-left: 0; }
  td.org-name { min-width: 280px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>Мониторинг паспортлари <span>ПК-394</span></h1>
      <div class="header-subtitle">Қисқартирилган рўйхат: фақат берилган 61 та ташкилот ва уларнинг паспорт сони.</div>
    </div>
    <div class="header-actions">
      <div class="sync-badge">
        <div class="sync-dot"></div>
        <span>Локал режим</span>
      </div>
      <button class="btn" onclick="resetAll()">&#8635; Тозалаш</button>
      <button class="btn btn-accent" onclick="exportCSV()">&#8595; CSV экспорт</button>
    </div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Барчаси</button>
  <button class="filter-btn" data-filter="none" onclick="setFilter('none', this)">Бошланмаган</button>
  <button class="filter-btn" data-filter="partial" onclick="setFilter('partial', this)">Жараёнда</button>
  <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">Тугалланган &#10003;</button>
  <input class="search-box" type="text" placeholder="Қидириш..." oninput="applyFilters()">
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>&#8470;</th>
        <th>Ташкилот номи</th>
        <th class="check-col">Паспорт<br>мавжуд</th>
        <th class="check-col">Масъул<br>аниқланган</th>
        <th class="check-col">Порталга<br>киритилган</th>
        <th class="check-col">АСРР<br>текширган</th>
        <th>Ҳолати</th>
      </tr>
      <tr class="col-stats-row">
        <th></th>
        <th></th>
        <th id="colStat0"></th>
        <th id="colStat1"></th>
        <th id="colStat2"></th>
        <th id="colStat3"></th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="export-toast" id="toast"></div>

<script>
const STORAGE_KEY = 'pk394-monitoring-passports-v1';

const orgs = [
  { id: 1, name: "Олий таълим, фан ва инновациялар вазирлиги", count: 74, done: false },
  { id: 2, name: "Соғлиқни сақлаш вазирлиги", count: 36, done: false },
  { id: 3, name: "Иқтисодиёт ва молия вазирлиги", count: 35, done: false },
  { id: 4, name: "Инвестициялар, саноат ва савдо вазирлиги", count: 34, done: false },
  { id: 5, name: "Рақамли технологиялар вазирлиги", count: 29, done: false },
  { id: 6, name: "Экология ва иқлим ўзгариши миллий қўмитаси", count: 29, done: false },
  { id: 7, name: "Адлия вазирлиги", count: 27, done: true },
  { id: 8, name: "Маданият вазирлиги", count: 25, done: false },
  { id: 9, name: "Қишлоқ хўжалиги вазирлиги", count: 19, done: false },
  { id: 10, name: "Мактабгача ва мактаб таълими вазирлиги", count: 18, done: true },
  { id: 11, name: "Қорақалпоғистон Республикаси Вазирлар Кенгаши", count: 18, done: true },
  { id: 12, name: "Транспорт вазирлиги", count: 17, done: false },
  { id: 13, name: "вилоятлар ва Тошкент шаҳар ҳокимликлари", count: 16, done: true },
  { id: 14, name: "Спорт вазирлиги", count: 13, done: true },
  { id: 15, name: "Ташқи ишлар вазирлиги", count: 13, done: false },
  { id: 16, name: "Сув хўжалиги вазирлиги", count: 12, done: true },
  { id: 17, name: "Қурилиш ва уй-жой коммунал хўжалиги вазирлиги", count: 12, done: true },
  { id: 18, name: "Ички ишлар вазирлиги", count: 11, done: false },
  { id: 19, name: "Камбағалликни қисқартириш ва бандлик вазирлиги", count: 11, done: false },
  { id: 20, name: "Ёшлар ишлари агентлиги", count: 10, done: true },
  { id: 21, name: "Энергетика вазирлиги", count: 10, done: false },
  { id: 22, name: "Ижтимоий ҳимоя миллий агентлиги", count: 9, done: false },
  { id: 23, name: "Туризм қўмитаси", count: 9, done: true },
  { id: 24, name: "Фавқулодда вазиятлар вазирлиги", count: 8, done: false },
  { id: 25, name: "Тоғ-кон саноати ва геология вазирлиги", count: 7, done: true },
  { id: 26, name: "Маданий мерос агентлиги", count: 6, done: true },
  { id: 27, name: "Миллатлараро муносабатлар ва хориждаги ватандошлар масалалари бўйича қўмита", count: 6, done: false },
  { id: 28, name: "Оила ва хотин-қизлар қўмитаси", count: 6, done: true },
  { id: 29, name: "Миграция агентлиги", count: 5, done: false },
  { id: 30, name: "Мудофаа вазирлиги", count: 5, done: true },
  { id: 31, name: "Урбанизация ва уй-жой бозорини барқарор ривожлантириш миллий қўмитаси", count: 5, done: false },
  { id: 32, name: "Бошқарув самарадорлиги агентлиги", count: 4, done: false },
  { id: 33, name: "Олий суд", count: 4, done: true },
  { id: 34, name: "Энергия самарадорлиги миллий агентлиги", count: 4, done: false },
  { id: 35, name: "Таълим сифатини таъминлаш миллий агентлиги", count: 3, done: false },
  { id: 36, name: "Фанлар академияси", count: 3, done: false },
  { id: 37, name: "Ахборот ва оммавий коммуникациялар агентлиги", count: 2, done: false },
  { id: 38, name: "Давлат активларини бошқариш агентлиги", count: 2, done: true },
  { id: 39, name: "Жаҳон савдо ташкилоти масалалари бўйича махсус вакил", count: 2, done: false },
  { id: 40, name: "Инсон ҳуқуқлари бўйича Миллий марказ", count: 2, done: false },
  { id: 41, name: "Оммавий ахборот воситалари учун контент тайёрлаш маркази", count: 2, done: false },
  { id: 42, name: "Рақобатни ривожлантириш ва истеъмолчилар ҳуқуқларини ҳимоя қилиш қўмитаси", count: 2, done: true },
  { id: 43, name: "Республика Маънавият ва маърифат маркази", count: 2, done: true },
  { id: 44, name: "Савдо-саноат палатаси", count: 2, done: false },
  { id: 45, name: "бошқа ҳуқуқни муҳофаза қилувчи органлар", count: 2, done: false },
  { id: 46, name: "Қурилиш ва уй-жой коммунал хўжалиги соҳасида назорат қилиш инспекцияси", count: 2, done: false },
  { id: 47, name: "“Ўзсувтаъминот” АЖ", count: 2, done: false },
  { id: 48, name: "Ўзбекистон футбол ассоциацияси", count: 1, done: false },
  { id: 49, name: "Бош прокуратура", count: 1, done: false },
  { id: 50, name: "Вазирлар Маҳкамаси", count: 1, done: false },
  { id: 51, name: "Енгил саноатни ривожлантириш агентлиги", count: 1, done: false },
  { id: 52, name: "Марказий банк", count: 1, done: false },
  { id: 53, name: "Олий Мажлис Сенати (келишилган ҳолда)", count: 1, done: false },
  { id: 54, name: "Сиёсий партияларнинг марказий кенгашлари", count: 1, done: false },
  { id: 55, name: "Радиация ва ядро хавфсизлиги қўмитаси", count: 1, done: true },
  { id: 56, name: "“Ўзбекнефтгаз” АЖ", count: 1, done: false },
  { id: 57, name: "“Ўзтрансгаз” АЖ", count: 1, done: false },
  { id: 58, name: "“Ижтимоий фикр” маркази", count: 1, done: false },
  { id: 59, name: "“Иссиқлик таъминоти” АЖ", count: 1, done: false },
  { id: 60, name: "“Тараққиёт стратегияси” маркази", count: 1, done: true },
  { id: 61, name: "“Ҳудудгаз-таъминот” АЖ", count: 1, done: false }
];

let state = buildInitialState();
let currentFilter = 'all';

function buildInitialState() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      return JSON.parse(saved);
    } catch (error) {
      localStorage.removeItem(STORAGE_KEY);
    }
  }

  const initialState = {};
  orgs.forEach(function(org) {
    initialState[org.id] = org.done ? [true, true, true, true] : [false, false, false, false];
  });
  return initialState;
}

function persistState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getOrgState(id) {
  if (!state[id]) state[id] = [false, false, false, false];
  return state[id];
}

function getCheckedCount(id) {
  return getOrgState(id).filter(Boolean).length;
}

function statusLabel(count) {
  const labels = ['Бошланмаган', '1/4', '2/4', '3/4', 'Тугалланган \u2713'];
  return '<span class="row-status status-' + count + '">' + labels[count] + '</span>';
}

function toggle(id, idx, val) {
  const orgState = getOrgState(id);
  orgState[idx] = val;
  persistState();
  render();
}

function render() {
  const tbody = document.getElementById('tableBody');
  const searchEl = document.querySelector('.search-box');
  const search = searchEl ? searchEl.value.toLowerCase() : '';
  let html = '';

  orgs.forEach(function(item) {
    const orgState = getOrgState(item.id);
    const cnt = getCheckedCount(item.id);
    const matchSearch = !search || item.name.toLowerCase().indexOf(search) !== -1;
    const matchFilter = currentFilter === 'all'
      || (currentFilter === 'none' && cnt === 0)
      || (currentFilter === 'partial' && cnt > 0 && cnt < 4)
      || (currentFilter === 'done' && cnt === 4);

    if (!matchSearch || !matchFilter) return;

    html += '<tr class="' + (cnt === 4 ? 'completed' : '') + '">'
      + '<td class="num">' + item.id + '</td>'
      + '<td class="org-name"><div class="org-line"><span>' + item.name + '</span><span class="passport-count">' + item.count + ' та</span></div></td>';

    for (let j = 0; j < 4; j++) {
      html += '<td class="check-cell"><label class="cb-wrap"><input type="checkbox" '
        + (orgState[j] ? 'checked ' : '')
        + 'onchange="toggle(' + item.id + ',' + j + ', this.checked)"></label></td>';
    }

    html += '<td>' + statusLabel(cnt) + '</td></tr>';
  });

  tbody.innerHTML = html;
  updateStats();
}

function setFilter(filter, btn) {
  currentFilter = filter;
  const buttons = document.querySelectorAll('.filter-btn');
  buttons.forEach(function(button) { button.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

function applyFilters() {
  render();
}

function updateStats() {
  const total = orgs.length;
  let done = 0;
  let partial = 0;
  let none = 0;
  let totalChecks = 0;
  const colCounts = [0, 0, 0, 0];

  orgs.forEach(function(org) {
    const orgState = getOrgState(org.id);
    const checked = getCheckedCount(org.id);
    totalChecks += checked;

    for (let j = 0; j < 4; j++) {
      if (orgState[j]) colCounts[j]++;
    }

    if (checked === 4) done++;
    else if (checked > 0) partial++;
    else none++;
  });

  const pct = Math.round(totalChecks / (total * 4) * 100);

  document.getElementById('statsBar').innerHTML =
    '<div class="stat-card">'
    + '<div class="stat-dot" style="background:var(--green)"></div>'
    + '<div><div class="stat-value">' + done + '</div><div class="stat-label">Тугалланган</div></div>'
    + '</div>'
    + '<div class="stat-card">'
    + '<div class="stat-dot" style="background:var(--yellow)"></div>'
    + '<div><div class="stat-value">' + partial + '</div><div class="stat-label">Жараёнда</div></div>'
    + '</div>'
    + '<div class="stat-card">'
    + '<div class="stat-dot" style="background:var(--red)"></div>'
    + '<div><div class="stat-value">' + none + '</div><div class="stat-label">Бошланмаган</div></div>'
    + '</div>'
    + '<div class="progress-bar-wrap">'
    + '<div class="progress-bar-label"><span>Умумий прогресс</span><span>' + pct + '% (' + totalChecks + '/' + (total * 4) + ')</span></div>'
    + '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>'
    + '</div>';

  const colColors = ['var(--accent)', 'var(--orange)', 'var(--yellow)', 'var(--green)'];
  for (let i = 0; i < 4; i++) {
    const colPct = Math.round(colCounts[i] / total * 100);
    document.getElementById('colStat' + i).innerHTML =
      '<div class="col-stat">'
      + '<div class="col-stat-pct" style="color:' + colColors[i] + '">' + colPct + '%</div>'
      + '<div class="col-stat-count">' + colCounts[i] + ' / ' + total + '</div>'
      + '<div class="col-mini-bar"><div class="col-mini-fill" style="width:' + colPct + '%;background:' + colColors[i] + '"></div></div>'
      + '</div>';
  }
}

function resetAll() {
  if (!confirm('Барча галочкалар тозалансинми?')) return;
  state = {};
  orgs.forEach(function(org) {
    state[org.id] = [false, false, false, false];
  });
  persistState();
  render();
}

function exportCSV() {
  let csv = '\uFEFF\u2116,Ташкилот номи,Сони,Паспорт мавжуд,Масъул аниқланган,Порталга киритилган,АСРР текширган,Ҳолати\n';
  const labels = ['Бошланмаган', '1/4', '2/4', '3/4', 'Тугалланган'];

  orgs.forEach(function(org) {
    const orgState = getOrgState(org.id);
    const cnt = getCheckedCount(org.id);
    const name = org.name.replace(/"/g, '""');
    csv += org.id + ',"' + name + '",' + org.count + ','
      + (orgState[0] ? 'Ха' : 'Йўқ') + ','
      + (orgState[1] ? 'Ха' : 'Йўқ') + ','
      + (orgState[2] ? 'Ха' : 'Йўқ') + ','
      + (orgState[3] ? 'Ха' : 'Йўқ') + ','
      + labels[cnt] + '\n';
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'pk394_monitoring_' + new Date().toISOString().slice(0, 10) + '.csv';
  link.click();
  showToast('\u2193 CSV файл юклаб олинди');
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 2500);
}

render();
</script>
</body>
</html>
